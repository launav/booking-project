<header class="header">
  <div class="header__container">

    <!-- Logotipo -->
    <a class="header__logo" routerLink="/home" aria-label="Ir a inicio">
      <img src="/images/logotipo-roomify.png" alt="Roomify" class="logo-img">
    </a>

    <!-- Acciones -->
    <nav class="header__actions">

      <!-- Botón Alojamientos -->
      <a class="header__nav-link" routerLink="/alojamientos">
        <span class="material-symbols-outlined">home</span>
        <span class="header__nav-label">Alojamientos</span>
      </a>

      <!-- Icono usuario (naranja) -->
      <button class="header__icon-btn header__icon-btn--profile"
              mat-icon-button
              [matMenuTriggerFor]="userMenu"
              aria-label="Menú de usuario">
        <span class="material-symbols-outlined menu-icon">person</span>
      </button>

      <!-- Menú usuario -->
      <mat-menu #userMenu="matMenu" class="header-menu">
        @if (isLoggedIn()) {
          <div class="menu-user-name">
            <span class="material-symbols-outlined">account_circle</span>
            <span>{{ userName() }}</span>
          </div>
          <mat-divider />
          <button mat-menu-item (click)="goToProfile()">
            <span class="material-symbols-outlined">manage_accounts</span>
            <span>Mis datos</span>
          </button>
          <button mat-menu-item (click)="deleteAccount()">
            <span class="material-symbols-outlined">delete_outline</span>
            <span>Eliminar cuenta</span>
          </button>
          <mat-divider />
          <button mat-menu-item (click)="logout()">
            <span class="material-symbols-outlined">logout</span>
            <span>Cerrar sesión</span>
          </button>
        } @else {
          <button mat-menu-item routerLink="/login">
            <span class="material-symbols-outlined">login</span>
            <span>Iniciar sesión</span>
          </button>
          <button mat-menu-item routerLink="/register">
            <span class="material-symbols-outlined">person_add</span>
            <span>Registrarse</span>
          </button>
        }
      </mat-menu>

      <!-- Icono menú (rojo) -->
      <button class="header__icon-btn header__icon-btn--menu"
              mat-icon-button
              [matMenuTriggerFor]="navMenu"
              aria-label="Menú de navegación">
        <span class="material-symbols-outlined menu-icon">menu</span>
      </button>

      <!-- Menú navegación -->
      <mat-menu #navMenu="matMenu" class="header-menu">
        <button mat-menu-item (click)="goToFavorites()">
          <span class="material-symbols-outlined">favorite</span>
          <span>Favoritos</span>
        </button>
        <button mat-menu-item (click)="goToReservations()">
          <span class="material-symbols-outlined">home</span>
          <span>Reservas</span>
        </button>
      </mat-menu>

    </nav>
  </div>
</header>
