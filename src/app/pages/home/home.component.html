<main class="home">

  <section class="home__section">
    <div class="home__section-header">
      <h2 class="home__section-title">
        Habitaciones populares{{ location() ? ' en ' + location() : '' }}
      </h2>
      <button class="home__section-more" (click)="goToSection('rooms')" aria-label="Ver más habitaciones">
        <span class="material-symbols-outlined">chevron_right</span>
      </button>
    </div>
    <div class="home__grid">
      @for (room of rooms(); track room.id) {
      <app-card [card]="room" [isFavorite]="room.isFavorite ?? false" (favoriteToggle)="onFavoriteToggle($event)"
        (cardClick)="onCardClick($event)" />
      } @empty {
      <p class="home__empty">No hay habitaciones disponibles</p>
      }
    </div>
  </section>

  <section class="home__section">
    <div class="home__section-header">
      <h2 class="home__section-title">Hoteles a tu disposición</h2>
    </div>
    <div class="home__grid">
      @for (hotel of hotels(); track hotel.id) {
        <app-card [card]="hotel" [showFavorite]="false" [interactive]="false" />
      } @empty {
        <p class="home__empty">No hay hoteles disponibles</p>
      }
    </div>
  </section>

  <section class="home__section">
    <app-carousel [items]="visits()" [visible]="2" />
  </section>

</main>
