<!-- Cabecera -->
<div class="payment__header">
  <h1 class="payment__title">Finalizar reserva</h1>
  <nav class="payment__steps">
    <span class="payment__step">1. Detalles de la reserva</span>
    <span class="payment__step payment__step--active">2. Forma de pago</span>
    <span class="payment__step">3. Confirmación</span>
  </nav>
</div>

<!-- Formulario -->
<form [formGroup]="form" (ngSubmit)="continue()" novalidate>

  <!-- Información personal -->
  <div class="payment__card">
    <h2 class="payment__card-title">Información personal</h2>

    <!-- Fila 1: nombre, apellido, segundo apellido -->
    <div class="payment__row payment__row--3">
      <div class="payment__field">
        <input class="payment__input" formControlName="nombre" placeholder="Nombre" type="text" />
      </div>
      <div class="payment__field">
        <input class="payment__input" formControlName="apellido" placeholder="Apellido" type="text" />
      </div>
      <div class="payment__field">
        <input class="payment__input" formControlName="segundoApellido" placeholder="Segundo apellido (Opcional)" type="text" />
      </div>
    </div>

    <!-- Fila 2: dirección -->
    <div class="payment__row payment__row--1">
      <div class="payment__field">
        <input class="payment__input" formControlName="direccion" placeholder="Dirección" type="text" />
      </div>
    </div>

    <!-- Fila 3: país, ciudad, código postal -->
    <div class="payment__row payment__row--3">
      <div class="payment__field">
        <select class="payment__input payment__select" formControlName="pais" (change)="onPaisChange()">
          <option value="" disabled selected>País</option>
          @for (p of paises; track p) {
            <option [value]="p">{{ p }}</option>
          }
        </select>
      </div>
      <div class="payment__field">
        <select class="payment__input payment__select" formControlName="ciudad">
          <option value="" disabled selected>Ciudad</option>
          @for (c of ciudadesList; track c) {
            <option [value]="c">{{ c }}</option>
          }
        </select>
      </div>
      <div class="payment__field">
        <input class="payment__input" formControlName="codigoPostal" placeholder="Código Postal" type="text" />
      </div>
    </div>

    <!-- Fila 4: email, teléfono -->
    <div class="payment__row payment__row--2">
      <div class="payment__field">
        <input class="payment__input" formControlName="email" placeholder="Email" type="email" />
      </div>
      <div class="payment__field">
        <input class="payment__input" formControlName="telefono" placeholder="Teléfono" type="tel" />
      </div>
    </div>

    <!-- Checkbox -->
    <label class="payment__checkbox-label">
      <input class="payment__checkbox" formControlName="mismaDireccion" type="checkbox" />
      <span>La dirección de facturación es la misma</span>
    </label>
  </div>

  <!-- Método de pago -->
  <div class="payment__card">
    <h2 class="payment__card-title">Método de pago</h2>

    <!-- Tarjeta de crédito / débito -->
    <label class="payment__method" [class.payment__method--selected]="paymentMethod() === 'tarjeta'"
           (click)="selectPayment('tarjeta')">
      <span class="payment__radio" [class.payment__radio--checked]="paymentMethod() === 'tarjeta'"></span>
      <span class="payment__method-name">Tarjeta de crédito / débito</span>
      <div class="payment__logos">
        <span class="payment__logo payment__logo--visa">VISA</span>
      </div>
    </label>

    <!-- PayPal -->
    <label class="payment__method" [class.payment__method--selected]="paymentMethod() === 'paypal'"
           (click)="selectPayment('paypal')">
      <span class="payment__radio" [class.payment__radio--checked]="paymentMethod() === 'paypal'"></span>
      <span class="payment__method-name">Paypal</span>
      <span class="payment__logo-paypal">
        <span class="payment__paypal-pay">Pay</span><span class="payment__paypal-pal">Pal</span>
      </span>
    </label>

    <!-- Google Pay -->
    <label class="payment__method" [class.payment__method--selected]="paymentMethod() === 'googlepay'"
           (click)="selectPayment('googlepay')">
      <span class="payment__radio" [class.payment__radio--checked]="paymentMethod() === 'googlepay'"></span>
      <span class="payment__method-name">Google Pay</span>
      <span class="payment__logo-gpay">G Pay</span>
    </label>
  </div>

</form>

<!-- Barra inferior fija -->
<div class="payment__footer">
  <div class="payment__footer-total">
    <span class="payment__footer-label">Total</span>
    <span class="payment__footer-price">{{ totalPrice() | number:'1.2-2' }} €</span>
  </div>
  <button class="payment__footer-btn"
          [disabled]="!canContinue()"
          [class.payment__footer-btn--active]="canContinue()"
          (click)="continue()">
    Continuar con el pago
  </button>
</div>
